name: Generate SVGs

on:
  push:
    branches: [main]
    paths:
      - 'registry/*.json'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main-branch

      - name: Checkout svg branch
        uses: actions/checkout@v4
        with:
          ref: svg
          path: svg-branch

      - name: Generate SVGs
        run: |
          cd main-branch
          python3 scripts/generate_svg.py
          echo "Generated:"
          ls svg-out/

      - name: Copy SVGs to svg branch
        run: |
          cp main-branch/svg-out/*.svg svg-branch/ 2>/dev/null || true

      - name: Commit and push to svg branch
        run: |
          cd svg-branch
          git config user.name  "cert-bot"
          git config user.email "bot@neg-zero.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "regen svgs [skip ci]"
          git push

      - name: Register issued IDs with Worker KV
        env:
          WORKER_URL:      "https://cert.neg-zero.com"
          CF_CERT_SECRET:  ${{ secrets.CF_CERT_SECRET }}
        run: |
          cd main-branch
          for f in registry/*.json; do
            ID=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d['id'])")
            REPO_URL=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('meta',{}).get('url',''))")
            echo "Registering $ID ($REPO_URL)..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$WORKER_URL/api/issue" \
              -H "Content-Type: application/json" \
              -H "X-Cert-Secret: $CF_CERT_SECRET" \
              -d "{\"id\":\"$ID\",\"repo_url\":\"$REPO_URL\"}")
            if [ "$STATUS" = "200" ]; then
              echo "  ✓ registered"
            elif [ "$STATUS" = "409" ]; then
              echo "  ~ already registered (ok)"
            else
              echo "  ✗ unexpected status $STATUS"
            fi
          done
