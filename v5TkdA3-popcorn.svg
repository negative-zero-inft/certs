size="9" class="eras">This project relies on multiple proprietary kernel</text><text x="20" y="676" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">drivers to work. There's no real alternative to them</text><text x="20" y="689" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">since the OEM and the Linux kernel themselves don't</text><text x="20" y="702" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">provide any way to source them in a way that allows the</text><text x="20" y="715" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">user to read the source code.</text><rect x="0" y="736" width="420" height="60" class="exc-bg"/><rect x="0" y="736" width="3" height="60" fill="#f59e0b"/><text x="20" y="752" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" class="etit">Linux source code</text><text x="20" y="764" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">This project relies on the Linux kernel which, itself,</text><text x="20" y="777" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">isn't compatible with NAPALM as it is licensed under</text><text x="20" y="790" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">GPL-2.0 As of right now, there's not a compatible</text><text x="20" y="803" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">alternative.</text><rect x="0" y="824" width="420" height="60" class="exc-bg"/><rect x="0" y="824" width="3" height="60" fill="#f59e0b"/><text x="20" y="840" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" class="etit">Nix reliance</text><text x="20" y="852" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">This project relies on Nix which, itself, isn't</text><text x="20" y="865" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">compatible with NAPALM as it is licensed under LGPL-2.1</text><text x="20" y="878" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" class="eras">As of right now, there's not a compatible alternative.</text></svg>